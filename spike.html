<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1220" />
    <title>NanoFab — NF3-0 renderer spike</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0b1220; color: #e6edf3;
        font-family: system-ui, sans-serif; overflow: hidden; }
      #spike { position: fixed; inset: 0; }
      #gl { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; }
      #hud { position: absolute; top: 10px; left: 10px; right: 10px; display: flex;
        justify-content: space-between; align-items: center; pointer-events: none; }
      #stats { background: rgba(20,29,48,0.85); padding: 8px 12px; border-radius: 8px;
        font-size: 14px; font-variant-numeric: tabular-nums; }
      #grids { pointer-events: auto; display: flex; gap: 6px; }
      #grids button { background: #1b2740; color: #e6edf3; border: 1px solid #2a3a5c;
        border-radius: 8px; padding: 8px 12px; font-size: 14px; }
      #grids button.on { background: #4cc9f0; color: #08121f; font-weight: 600; }
      #cutbar { position: absolute; right: 0; top: 15%; bottom: 25%; width: 56px;
        touch-action: none; background: linear-gradient(to left, rgba(76,201,240,0.12), transparent); }
      #cuthandle { position: absolute; right: 6px; width: 44px; height: 44px; margin-top: -22px;
        border-radius: 50%; background: #4cc9f0; opacity: 0.85;
        box-shadow: 0 2px 8px rgba(0,0,0,0.5); }
      #cuthandle::after { content: '✂'; display: grid; place-items: center; height: 100%;
        color: #08121f; font-size: 20px; }
      #timebar { position: absolute; left: 12px; right: 72px; bottom: 16px; height: 56px;
        touch-action: none; background: rgba(20,29,48,0.85); border-radius: 12px; }
      #timehead { position: absolute; top: 4px; bottom: 4px; width: 6px; margin-left: -3px;
        background: #4cc9f0; border-radius: 3px; }
      #phaselabel { position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
        font-size: 13px; color: #93a4bf; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="spike"></div>
    <script>
      // Module-independent boot beacon: if the ES module fails to load or
      // parse, this classic script still reports WHY, on-screen. (A failed
      // module cannot report its own death — learned the hard way.)
      (function () {
        function log(msg) {
          var el = document.getElementById('bootlog');
          if (!el) {
            el = document.createElement('pre');
            el.id = 'bootlog';
            el.style.cssText =
              'position:fixed;left:8px;right:8px;bottom:8px;z-index:99;max-height:45%;overflow:auto;' +
              'background:rgba(127,29,29,0.94);color:#fecaca;padding:10px 12px;border-radius:10px;' +
              'font:12px/1.5 monospace;white-space:pre-wrap;margin:0;';
            document.body.appendChild(el);
          }
          el.textContent += msg + '\n';
        }
        window.addEventListener('error', function (e) {
          log((e.message || 'resource load error') + ' @ ' + (e.filename || (e.target && e.target.src) || '?') + ':' + (e.lineno || ''));
        }, true);
        window.addEventListener('unhandledrejection', function (e) { log('unhandled: ' + e.reason); });
        setTimeout(function () {
          if (window.__spikeBoot) return; // module alive — stay silent
          log('spike module did not start within 4 s — diagnostics:');
          log('url: ' + location.href);
          log('ua: ' + navigator.userAgent);
          try {
            var c = document.createElement('canvas');
            log('webgl2 available: ' + !!c.getContext('webgl2'));
          } catch (err) { log('webgl2 check failed: ' + err); }
          log('sw controller: ' + (navigator.serviceWorker && navigator.serviceWorker.controller ? navigator.serviceWorker.controller.scriptURL : 'none'));
          var s = document.querySelector('script[type=module][src]');
          var src = s && s.getAttribute('src');
          log('module src: ' + src);
          if (src) {
            fetch(src, { cache: 'no-store' }).then(function (r) {
              log('module fetch: HTTP ' + r.status + ' · content-type=' + r.headers.get('content-type'));
              return r.text();
            }).then(function (t) {
              log('module head: ' + t.slice(0, 100).replace(/\s+/g, ' '));
            }).catch(function (err) { log('module fetch failed: ' + err); });
          }
        }, 4000);
      })();
    </script>
    <script type="module" src="/src/spike/main.ts"></script>
  </body>
</html>
