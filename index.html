<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1220" />
    <title>NanoFab</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <style>
      html, body { margin: 0; height: 100%; background: #0b1220; color: #e6edf3;
        font-family: system-ui, sans-serif; touch-action: manipulation; }
      #app { height: 100%; display: flex; flex-direction: column; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      // Module-independent boot beacon: if the ES module fails to load or
      // parse (wrong MIME from a bad deploy, old browser, SW mishap), this
      // classic script reports WHY on-screen instead of a silent blank page.
      (function () {
        function log(msg) {
          var el = document.getElementById('bootlog');
          if (!el) {
            el = document.createElement('pre');
            el.id = 'bootlog';
            el.style.cssText =
              'position:fixed;left:8px;right:8px;bottom:8px;z-index:99;max-height:45%;overflow:auto;' +
              'background:rgba(127,29,29,0.94);color:#fecaca;padding:10px 12px;border-radius:10px;' +
              'font:12px/1.5 monospace;white-space:pre-wrap;margin:0;';
            document.body.appendChild(el);
          }
          el.textContent += msg + '\n';
        }
        window.addEventListener('error', function (e) {
          log((e.message || 'resource load error') + ' @ ' + (e.filename || (e.target && e.target.src) || '?') + ':' + (e.lineno || ''));
        }, true);
        window.addEventListener('unhandledrejection', function (e) { log('unhandled: ' + e.reason); });
        setTimeout(function () {
          if (window.__nanofabBoot) return;
          log('game module did not start within 4 s — diagnostics:');
          log('url: ' + location.href);
          log('ua: ' + navigator.userAgent);
          log('sw controller: ' + (navigator.serviceWorker && navigator.serviceWorker.controller ? navigator.serviceWorker.controller.scriptURL : 'none'));
          var s = document.querySelector('script[type=module][src]');
          var src = s && s.getAttribute('src');
          log('module src: ' + src);
          if (src) {
            fetch(src, { cache: 'no-store' }).then(function (r) {
              log('module fetch: HTTP ' + r.status + ' · content-type=' + r.headers.get('content-type'));
              if ((r.headers.get('content-type') || '').indexOf('javascript') < 0) {
                log('>>> content-type is not JavaScript: the site is serving the RAW repository (legacy Pages branch build won the deploy race). Fix: repo Settings → Pages → Source = "GitHub Actions".');
              }
            }).catch(function (err) { log('module fetch failed: ' + err); });
          }
        }, 4000);
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
